name: Anurag Khandelwal, Assistant Professor

# Variables set by GitHub
safe: true
lsi: false
#highlighter: pygments
source: .

plugins:
  - jekyll-scholar

#markdown: redcarpet

permalink: pretty

# Enable HTTP redirects
gems:
  - jekyll-redirect-from
  - jekyll-scholar

# Ignore patterns
exclude: 
  - README.md
  - template/
  - Gemfile
  - Gemfile.lock
  - node_modules
